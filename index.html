<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <title>Do you love me?</title>
  <style>
    /* ── Password Overlay ── */
    #password-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: linear-gradient(135deg, #1a0010 0%, #3d0030 50%, #1a0010 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      font-family: "Quicksand", sans-serif;
    }
    .lock-icon { font-size: 4rem; animation: lockBounce 2s ease-in-out infinite; }
    @keyframes lockBounce {
      0%,100% { transform: translateY(0) rotate(-5deg); }
      50%      { transform: translateY(-12px) rotate(5deg); }
    }
    .overlay-title {
      font-family: "Dancing Script", cursive;
      font-size: 2.4rem;
      color: #ffb3d9;
      text-align: center;
      line-height: 1.3;
    }
    .overlay-subtitle {
      color: #ff80bf;
      font-size: 1rem;
      opacity: 0.8;
    }
    .pw-input-wrap {
      position: relative;
      width: 300px;
    }
    .pw-input-wrap input {
      width: 100%;
      padding: 14px 50px 14px 20px;
      border-radius: 50px;
      border: 2px solid rgba(255,84,164,0.4);
      background: rgba(255,255,255,0.07);
      color: white;
      font-family: "Quicksand", sans-serif;
      font-size: 1.1rem;
      letter-spacing: 3px;
      outline: none;
      text-align: center;
      transition: border 0.3s, box-shadow 0.3s;
    }
    .pw-input-wrap input::placeholder { letter-spacing: 1px; color: rgba(255,179,217,0.5); }
    .pw-input-wrap input:focus {
      border-color: #ff54a4;
      box-shadow: 0 0 20px rgba(255,84,164,0.4);
    }
    .toggle-eye {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 1.2rem;
      user-select: none;
    }
    .unlock-btn {
      background: linear-gradient(135deg, #ff54a4, #ff80bf);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 40px;
      font-family: "Quicksand", sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,84,164,0.5);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .unlock-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 28px rgba(255,84,164,0.7);
    }
    .pw-error {
      color: #ff6b6b;
      font-size: 0.95rem;
      min-height: 22px;
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-8px); }
      40%,80%  { transform: translateX(8px); }
    }
    .hint-text {
      color: rgba(255,179,217,0.45);
      font-size: 0.85rem;
      margin-top: -10px;
    }
    /* fade-out animation */
    #password-overlay.fade-out {
      animation: overlayFadeOut 0.7s ease forwards;
    }
    @keyframes overlayFadeOut {
      0%   { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.05); pointer-events: none; }
    }
    /* falling hearts in overlay */
    .overlay-hearts {
      position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
    }
    .oh {
      position: absolute; top: -40px; font-size: 1.3rem;
      animation: ohFall linear infinite; opacity: 0;
    }
    @keyframes ohFall {
      0%   { transform: translateY(-40px) rotate(0deg); opacity: 0.6; }
      100% { transform: translateY(110vh)  rotate(360deg); opacity: 0; }
    }
    #password-overlay > * { position: relative; z-index: 1; }
  </style>
</head>
<body>

<!-- ══════════ PASSWORD OVERLAY ══════════ -->
<div id="password-overlay">
  <div class="overlay-hearts" id="overlayHearts"></div>

  <div class="lock-icon">🔐</div>
  <p class="overlay-title">This is a secret page<br/>just for someone special 💕</p>
  <p class="overlay-subtitle">Enter the password to continue...</p>

  <div class="pw-input-wrap">
    <input type="password" id="pwInput" placeholder="enter password 🌸" autocomplete="off" />
    <span class="toggle-eye" id="toggleEye" title="Show/hide">👁️</span>
  </div>

  <button class="unlock-btn" id="unlockBtn">Unlock 💖</button>
  <p class="pw-error" id="pwError"></p>
  <p class="hint-text">Hint: it's your milestone this year 🎂</p>
</div>
<!-- ══════════════════════════════════════ -->

<div class="question-container container">
  <video class="local-gif" src="Reply me love.mp4" autoplay muted loop></video>
  <h2 class="question">Do you love me? 💕</h2>
  <div class="button-container">
    <button class="yes-btn btn js-yes-btn">Yes 💖</button>
    <button class="no-btn btn js-no-btn">No 😒</button>
  </div>
</div>

<div class="result-container container">
  <video class="gif-result" src="Love me.mp4" autoplay loop></video>
  <h2>I knew it 😍!</h2>
</div>

<div class="cssload-main">
  <div class="cssload-heart">
    <span class="cssload-heartL"></span>
    <span class="cssload-heartR"></span>
    <span class="cssload-square"></span>
  </div>
  <div class="cssload-shadow"></div>
</div>

<script src="script.js"></script>

<script>
  /* ── Password logic ── */
  const CORRECT = "turning23";
  const overlay  = document.getElementById("password-overlay");
  const pwInput  = document.getElementById("pwInput");
  const unlockBtn= document.getElementById("unlockBtn");
  const pwError  = document.getElementById("pwError");
  const toggleEye= document.getElementById("toggleEye");

  // Falling hearts inside overlay
  const oHearts = document.getElementById("overlayHearts");
  const syms = ["💕","💖","💗","🌸","✨","💫","🎀"];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement("div");
    el.classList.add("oh");
    el.textContent = syms[i % syms.length];
    el.style.left = `${Math.random() * 100}%`;
    el.style.animationDuration = `${5 + Math.random() * 7}s`;
    el.style.animationDelay    = `${Math.random() * 6}s`;
    el.style.fontSize = `${1 + Math.random() * 1.2}rem`;
    oHearts.appendChild(el);
  }

  // Toggle show/hide password
  toggleEye.addEventListener("click", () => {
    const show = pwInput.type === "password";
    pwInput.type = show ? "text" : "password";
    toggleEye.textContent = show ? "🙈" : "👁️";
  });

  function tryUnlock() {
    if (pwInput.value.trim().toLowerCase() === CORRECT) {
      pwError.textContent = "✅ Welcome! Opening...";
      pwError.style.color = "#88ffcc";
      overlay.classList.add("fade-out");
      overlay.addEventListener("animationend", () => overlay.remove(), { once: true });
    } else {
      pwError.textContent = "❌ Wrong password. Try again 💔";
      pwError.style.color = "#ff6b6b";
      // re-trigger shake by cloning
      pwError.style.animation = "none";
      void pwError.offsetWidth;
      pwError.style.animation = "";
      pwInput.value = "";
      pwInput.focus();
    }
  }

  unlockBtn.addEventListener("click", tryUnlock);
  pwInput.addEventListener("keydown", (e) => { if (e.key === "Enter") tryUnlock(); });
</script>
</body>
</html>
